services:
  - type: web
    name: prazojus
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: prazojus-db
          property: connectionString
      - key: NODE_VERSION
        value: 20.11.0

databases:
  - name: prazojus-db
    plan: free
