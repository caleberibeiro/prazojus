<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PrazoJus — Entrar</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700&display=swap" rel="stylesheet">

    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚖️</text></svg>">

    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: var(--space-6);
        }
        .login-card {
            width: 100%;
            max-width: 380px;
            background: var(--bg-secondary);
            border: var(--glass-border);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-xl);
            padding: var(--space-8) var(--space-6);
        }
        .login-logo {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: var(--space-2);
            margin-bottom: var(--space-6);
        }
        .login-logo-icon { font-size: 2.5rem; }
        .login-logo-text { font-family: var(--font-heading); font-size: var(--text-2xl); font-weight: 700; }
        .login-error {
            display: none;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid var(--danger);
            color: var(--danger);
            border-radius: var(--radius-md);
            padding: var(--space-3) var(--space-4);
            font-size: var(--text-sm);
            margin-bottom: var(--space-4);
        }
        .login-error.visible { display: block; }
        .login-submit {
            width: 100%;
            justify-content: center;
            height: 48px;
            margin-top: var(--space-2);
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-logo">
            <span class="login-logo-icon">⚖️</span>
            <span class="login-logo-text">PrazoJus</span>
        </div>

        <div id="login-error" class="login-error"></div>

        <form id="login-form">
            <div class="form-group">
                <label class="form-label">Usuário</label>
                <input type="text" id="login-username" class="form-input" autocomplete="username" autofocus required>
            </div>
            <div class="form-group">
                <label class="form-label">Senha</label>
                <input type="password" id="login-password" class="form-input" autocomplete="current-password" required>
            </div>
            <button type="submit" id="login-btn" class="btn btn-primary login-submit">
                Entrar
            </button>
        </form>
    </div>

    <script src="js/login.js"></script>
</body>
</html>
